<div class="p-3 border-bottom hover-bg">
  <div class="d-flex">
    <img [src]="tweet.profilePictureUrl" 
         class="rounded-circle me-3 object-fit-cover" 
         width="48" height="48" 
         [routerLink]="['/profile', tweet.username]">

    <div class="w-100 overflow-hidden">
      <div class="d-flex justify-content-between align-items-center">
        <div class="text-truncate">
          <span class="fw-bold me-1 hover-underline cursor-pointer" [routerLink]="['/profile', tweet.username]">
            {{ tweet.firstName }}
          </span>
          <span class="text-muted text-truncate">@{{ tweet.username }} · {{ tweet.createdAt | date:'MMM d' }}</span>
        </div>
        
        <button *ngIf="currentUser?.id === tweet.userId" 
                class="btn btn-sm text-danger border-0" 
                (click)="deleteTweet($event)">
          <i class="bi bi-trash"></i>
        </button>
      </div>

      <p class="mt-1 mb-2 fs-6" style="white-space: pre-wrap; word-break: break-word; line-height: 1.5;">
        <ng-container *ngFor="let part of textParts">
          <a *ngIf="part.type === 'hashtag'" 
             [routerLink]="part.link" 
             [queryParams]="part.query" 
             class="text-primary text-decoration-none hover-underline">
            {{ part.text }}
          </a>

          <a *ngIf="part.type === 'mention'" 
             [routerLink]="part.link" 
             class="text-primary text-decoration-none hover-underline">
            {{ part.text }}
          </a>

          <span *ngIf="part.type === 'text'">{{ part.text }}</span>
        </ng-container>
      </p>

      <div *ngIf="tweet.mediaUrl" class="mt-2 mb-2">
        <img [src]="tweet.mediaUrl" class="img-fluid rounded-4 border w-100" style="max-height: 512px; object-fit: cover;">
      </div>

      <div class="d-flex justify-content-between mt-3 text-muted" style="max-width: 425px;">
        <div class="hover-icon-blue d-flex align-items-center">
          <i class="bi bi-chat me-2"></i> {{ tweet.replies || 0 }}
        </div>
        <div class="hover-icon-green d-flex align-items-center" (click)="onRetweet($event)">
          <i class="bi bi-arrow-left-right me-2"></i> {{ tweet.retweets || 0 }}
        </div>
        <div class="hover-icon-pink d-flex align-items-center" (click)="onLike($event)">
          <i class="bi bi-heart me-2"></i> {{ tweet.likes || 0 }}
        </div>
        <div class="hover-icon-blue d-flex align-items-center">
          <i class="bi bi-graph-up"></i>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .hover-icon-blue:hover { color: #1d9bf0 !important; cursor: pointer; }
  .hover-icon-green:hover { color: #00ba7c !important; cursor: pointer; }
  .hover-icon-pink:hover { color: #f91880 !important; cursor: pointer; }
</style>
